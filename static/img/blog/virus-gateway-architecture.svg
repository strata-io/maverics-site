<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dangerZone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#da3633;stop-opacity:0.06" />
      <stop offset="100%" style="stop-color:#da3633;stop-opacity:0.02" />
    </linearGradient>
    <linearGradient id="safeZone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#238636;stop-opacity:0.02" />
      <stop offset="100%" style="stop-color:#238636;stop-opacity:0.06" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" rx="12" fill="url(#bgGrad2)"/>
  <rect x="1" y="1" width="898" height="478" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600" letter-spacing="0.5">AI Identity Gateway: Resource-Level Defense</text>

  <!-- Danger zone (left) -->
  <rect x="15" y="50" width="340" height="415" rx="8" fill="url(#dangerZone)" stroke="#da3633" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4,4"/>
  <text x="185" y="72" text-anchor="middle" fill="#da3633" font-size="11" font-weight="600" letter-spacing="1" opacity="0.7">COMPROMISED NETWORK</text>

  <!-- Safe zone (right) -->
  <rect x="545" y="50" width="340" height="415" rx="8" fill="url(#safeZone)" stroke="#238636" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4,4"/>
  <text x="715" y="72" text-anchor="middle" fill="#238636" font-size="11" font-weight="600" letter-spacing="1" opacity="0.7">PROTECTED RESOURCES</text>

  <!-- Compromised hosts -->
  <!-- Host 1: Patient Zero -->
  <rect x="35" y="90" width="145" height="70" rx="6" fill="#161b22" stroke="#da3633" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="107" y="114" text-anchor="middle" fill="#ff7b72" font-size="11" font-weight="600">Patient Zero</text>
  <text x="107" y="132" text-anchor="middle" fill="#8b949e" font-size="10">Developer Laptop</text>
  <text x="107" y="148" text-anchor="middle" fill="#da3633" font-size="9" opacity="0.8">Agent + SSH keys + AWS CLI</text>

  <!-- Host 2: Spread 1 -->
  <rect x="195" y="90" width="145" height="70" rx="6" fill="#161b22" stroke="#da3633" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="267" y="114" text-anchor="middle" fill="#ff7b72" font-size="11" font-weight="600">Compromised Host</text>
  <text x="267" y="132" text-anchor="middle" fill="#8b949e" font-size="10">Staging Server</text>
  <text x="267" y="148" text-anchor="middle" fill="#da3633" font-size="9" opacity="0.8">Agent + DB creds + K8s</text>

  <!-- Host 3 -->
  <rect x="35" y="175" width="145" height="70" rx="6" fill="#161b22" stroke="#da3633" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="107" y="199" text-anchor="middle" fill="#ff7b72" font-size="11" font-weight="600">Compromised Host</text>
  <text x="107" y="217" text-anchor="middle" fill="#8b949e" font-size="10">CI/CD Runner</text>
  <text x="107" y="233" text-anchor="middle" fill="#da3633" font-size="9" opacity="0.8">Agent + Deploy keys</text>

  <!-- Cloud instance -->
  <rect x="195" y="175" width="145" height="70" rx="6" fill="#161b22" stroke="#da3633" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="267" y="199" text-anchor="middle" fill="#ff7b72" font-size="11" font-weight="600">Cloned Instance</text>
  <text x="267" y="217" text-anchor="middle" fill="#8b949e" font-size="10">AWS EC2</text>
  <text x="267" y="233" text-anchor="middle" fill="#da3633" font-size="9" opacity="0.8">Agent + IAM role</text>

  <!-- Spread arrows between hosts -->
  <line x1="180" y1="125" x2="195" y2="125" stroke="#da3633" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="107" y1="160" x2="107" y2="175" stroke="#da3633" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="267" y1="160" x2="267" y2="175" stroke="#da3633" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="180" y1="210" x2="195" y2="210" stroke="#da3633" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="3,3"/>

  <!-- Stolen credentials box -->
  <rect x="35" y="265" width="305" height="85" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1" stroke-opacity="0.4"/>
  <text x="187" y="286" text-anchor="middle" fill="#e3b341" font-size="11" font-weight="600">Harvested Credentials</text>
  <text x="187" y="305" text-anchor="middle" fill="#8b949e" font-size="10">SSH keys | AWS creds | API tokens | PATs</text>
  <text x="187" y="322" text-anchor="middle" fill="#8b949e" font-size="10">Browser cookies | .env secrets | OAuth tokens</text>
  <text x="187" y="339" text-anchor="middle" fill="#da3633" font-size="10" font-style="italic" opacity="0.7">None of these produce a valid gateway JWT</text>

  <!-- Attempted access arrows (blocked) -->
  <line x1="340" y1="130" x2="380" y2="200" stroke="#da3633" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6,3"/>
  <line x1="340" y1="210" x2="380" y2="240" stroke="#da3633" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6,3"/>
  <line x1="340" y1="310" x2="380" y2="300" stroke="#da3633" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6,3"/>

  <!-- GATEWAY (center) -->
  <rect x="380" y="85" width="150" height="340" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2" filter="url(#glow2)"/>
  <rect x="380" y="85" width="150" height="40" rx="10" fill="#58a6ff" opacity="0.15"/>
  <text x="455" y="111" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700" letter-spacing="0.5">AI IDENTITY</text>
  <text x="455" y="128" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700" letter-spacing="0.5">GATEWAY</text>

  <!-- Gateway layers -->
  <rect x="393" y="145" width="124" height="36" rx="4" fill="#1f6feb" opacity="0.15" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.3"/>
  <text x="455" y="167" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">OAuth Token Validation</text>

  <rect x="393" y="190" width="124" height="36" rx="4" fill="#1f6feb" opacity="0.15" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.3"/>
  <text x="455" y="212" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">OPA Policy Engine</text>

  <rect x="393" y="235" width="124" height="36" rx="4" fill="#1f6feb" opacity="0.15" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.3"/>
  <text x="455" y="251" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">Human-in-the-Loop</text>
  <text x="455" y="264" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">Verification</text>

  <rect x="393" y="280" width="124" height="36" rx="4" fill="#1f6feb" opacity="0.15" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.3"/>
  <text x="455" y="296" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">Token Exchange</text>
  <text x="455" y="309" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">(RFC 8693)</text>

  <rect x="393" y="325" width="124" height="36" rx="4" fill="#1f6feb" opacity="0.15" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.3"/>
  <text x="455" y="347" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="600">Audit Trail</text>

  <!-- TTL badge -->
  <rect x="393" y="370" width="124" height="30" rx="4" fill="#238636" opacity="0.15" stroke="#238636" stroke-width="1" stroke-opacity="0.3"/>
  <text x="455" y="390" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">TTL: 5s | Per-tool scope</text>

  <!-- Blocked symbols on gateway left edge -->
  <circle cx="383" cy="200" r="10" fill="#da3633" opacity="0.2" stroke="#da3633" stroke-width="1.5"/>
  <text x="383" y="204" text-anchor="middle" fill="#ff7b72" font-size="12" font-weight="700">&#x2715;</text>
  <circle cx="383" cy="245" r="10" fill="#da3633" opacity="0.2" stroke="#da3633" stroke-width="1.5"/>
  <text x="383" y="249" text-anchor="middle" fill="#ff7b72" font-size="12" font-weight="700">&#x2715;</text>
  <circle cx="383" cy="300" r="10" fill="#da3633" opacity="0.2" stroke="#da3633" stroke-width="1.5"/>
  <text x="383" y="304" text-anchor="middle" fill="#ff7b72" font-size="12" font-weight="700">&#x2715;</text>

  <!-- Allowed arrows (right side of gateway) -->
  <line x1="530" y1="170" x2="560" y2="140" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>
  <polygon points="558,135 567,140 558,145" fill="#3fb950" opacity="0.6"/>
  <line x1="530" y1="250" x2="560" y2="250" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>
  <polygon points="558,245 567,250 558,255" fill="#3fb950" opacity="0.6"/>
  <line x1="530" y1="330" x2="560" y2="360" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>
  <polygon points="558,355 567,360 558,365" fill="#3fb950" opacity="0.6"/>

  <!-- Checkmarks on right side -->
  <circle cx="527" cy="170" r="8" fill="#238636" opacity="0.2" stroke="#238636" stroke-width="1.5"/>
  <text x="527" y="174" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">&#x2713;</text>
  <circle cx="527" cy="250" r="8" fill="#238636" opacity="0.2" stroke="#238636" stroke-width="1.5"/>
  <text x="527" y="254" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">&#x2713;</text>
  <circle cx="527" cy="330" r="8" fill="#238636" opacity="0.2" stroke="#238636" stroke-width="1.5"/>
  <text x="527" y="334" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">&#x2713;</text>

  <!-- Protected Resources -->
  <!-- MCP Server -->
  <rect x="570" y="100" width="145" height="65" rx="6" fill="#161b22" stroke="#238636" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="642" y="122" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">MCP Server</text>
  <text x="642" y="140" text-anchor="middle" fill="#8b949e" font-size="10">Mission Control</text>
  <text x="642" y="155" text-anchor="middle" fill="#238636" font-size="9" opacity="0.8">JWT auth + scoped tokens</text>

  <!-- API -->
  <rect x="570" y="215" width="145" height="65" rx="6" fill="#161b22" stroke="#238636" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="642" y="237" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">REST API</text>
  <text x="642" y="255" text-anchor="middle" fill="#8b949e" font-size="10">Employee Directory</text>
  <text x="642" y="270" text-anchor="middle" fill="#238636" font-size="9" opacity="0.8">JWT auth + actor chains</text>

  <!-- Database -->
  <rect x="570" y="330" width="145" height="65" rx="6" fill="#161b22" stroke="#238636" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="642" y="352" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Database</text>
  <text x="642" y="370" text-anchor="middle" fill="#8b949e" font-size="10">Enterprise Data</text>
  <text x="642" y="385" text-anchor="middle" fill="#238636" font-size="9" opacity="0.8">Policy-protected access</text>

  <!-- IdP (top right) -->
  <rect x="740" y="100" width="130" height="65" rx="6" fill="#161b22" stroke="#a371f7" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="805" y="122" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="600">Identity Provider</text>
  <text x="805" y="140" text-anchor="middle" fill="#8b949e" font-size="10">Keycloak / Entra</text>
  <text x="805" y="155" text-anchor="middle" fill="#a371f7" font-size="9" opacity="0.8">OIDC + Token Exchange</text>

  <!-- HYPR (bottom right) -->
  <rect x="740" y="330" width="130" height="65" rx="6" fill="#161b22" stroke="#a371f7" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="805" y="352" text-anchor="middle" fill="#a371f7" font-size="11" font-weight="600">FIDO2 / HYPR</text>
  <text x="805" y="370" text-anchor="middle" fill="#8b949e" font-size="10">Phishing-Resistant</text>
  <text x="805" y="385" text-anchor="middle" fill="#a371f7" font-size="9" opacity="0.8">Hardware-bound biometric</text>

  <!-- Connection: IdP to Gateway -->
  <line x1="740" y1="140" x2="530" y2="160" stroke="#a371f7" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <!-- Connection: HYPR to Gateway -->
  <line x1="740" y1="360" x2="530" y2="300" stroke="#a371f7" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>

  <!-- Bottom label -->
  <text x="187" y="440" text-anchor="middle" fill="#484f58" font-size="10" font-style="italic">Stolen credentials are useless</text>
  <text x="187" y="455" text-anchor="middle" fill="#484f58" font-size="10" font-style="italic">against gateway-protected resources</text>
  <text x="715" y="440" text-anchor="middle" fill="#484f58" font-size="10" font-style="italic">Every access requires a fresh, scoped,</text>
  <text x="715" y="455" text-anchor="middle" fill="#484f58" font-size="10" font-style="italic">human-verified token</text>
</svg>
