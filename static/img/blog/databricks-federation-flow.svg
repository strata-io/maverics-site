<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6f5eea"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00CFC7"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FEE03B"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#AD83FF"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="760" fill="#0D172E" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#FEE03B" font-size="14" font-weight="bold">Federated Token Brokering for Databricks Account-Wide Token Federation</text>
  <text x="450" y="46" text-anchor="middle" fill="#8899aa" font-size="10">Agent · Maverics Gateway · Maverics Authorization Server · Databricks</text>

  <!-- Column headers -->
  <text x="120" y="72" text-anchor="middle" fill="#AD83FF" font-size="12" font-weight="bold">Agent</text>
  <text x="120" y="88" text-anchor="middle" fill="#8899aa" font-size="9">ai-analyst-agent</text>

  <text x="360" y="72" text-anchor="middle" fill="#00CFC7" font-size="12" font-weight="bold">Maverics Gateway</text>
  <text x="360" y="88" text-anchor="middle" fill="#8899aa" font-size="9">MCP proxy · inbound authz</text>

  <text x="580" y="72" text-anchor="middle" fill="#6f5eea" font-size="12" font-weight="bold">Maverics Auth Server</text>
  <text x="580" y="88" text-anchor="middle" fill="#8899aa" font-size="9">Token issuer · Federated Exchange</text>

  <text x="800" y="72" text-anchor="middle" fill="#AD83FF" font-size="12" font-weight="bold">Databricks</text>
  <text x="800" y="88" text-anchor="middle" fill="#8899aa" font-size="9">Federation policy · Unity Catalog</text>

  <!-- Lifelines -->
  <line x1="120" y1="105" x2="120" y2="665" stroke="#AD83FF" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="360" y1="105" x2="360" y2="665" stroke="#00CFC7" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="580" y1="105" x2="580" y2="665" stroke="#6f5eea" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="800" y1="105" x2="800" y2="665" stroke="#AD83FF" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Prereq banner -->
  <rect x="40" y="115" width="820" height="22" rx="4" fill="#6f5eea" fill-opacity="0.12" stroke="#6f5eea" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="450" y="130" text-anchor="middle" fill="#AD83FF" font-size="9">Prereq: Databricks federation policy trusts iss = https://auth.acme.com (Maverics AS) · aud = https://databricks.com</text>

  <!-- Step 1: Agent → Gateway -->
  <rect x="50" y="150" width="140" height="38" rx="4" fill="#AD83FF" fill-opacity="0.1" stroke="#AD83FF" stroke-width="1"/>
  <text x="120" y="166" text-anchor="middle" fill="#AD83FF" font-size="9" font-weight="bold">1. MCP tool call</text>
  <text x="120" y="180" text-anchor="middle" fill="#8899aa" font-size="8">+ user access token (JWT)</text>

  <line x1="190" y1="169" x2="290" y2="169" stroke="#6f5eea" stroke-width="2" marker-end="url(#arr)"/>
  <text x="240" y="163" text-anchor="middle" fill="#8899aa" font-size="8">run_query</text>

  <!-- Step 2: Gateway inbound authz -->
  <rect x="290" y="200" width="140" height="38" rx="4" fill="#00CFC7" fill-opacity="0.1" stroke="#00CFC7" stroke-width="1"/>
  <text x="360" y="216" text-anchor="middle" fill="#00CFC7" font-size="9" font-weight="bold">2. Inbound authz policy</text>
  <text x="360" y="230" text-anchor="middle" fill="#8899aa" font-size="8">allow / deny this tool call</text>

  <!-- Step 3: Gateway → AS -->
  <line x1="430" y1="260" x2="510" y2="260" stroke="#6f5eea" stroke-width="2" marker-end="url(#arr)"/>
  <text x="470" y="254" text-anchor="middle" fill="#00CFC7" font-size="9" font-weight="bold">3. Token exchange request</text>
  <text x="470" y="272" text-anchor="middle" fill="#8899aa" font-size="8">audience = https://databricks.com</text>

  <!-- Step 4: AS mint JWT -->
  <rect x="510" y="285" width="140" height="95" rx="4" fill="#6f5eea" fill-opacity="0.1" stroke="#6f5eea" stroke-width="1"/>
  <text x="580" y="301" text-anchor="middle" fill="#6f5eea" font-size="9" font-weight="bold">4. Mint delegation JWT</text>
  <text x="580" y="317" text-anchor="middle" fill="#8899aa" font-size="8">iss: auth.acme.com</text>
  <text x="580" y="331" text-anchor="middle" fill="#8899aa" font-size="8">sub: alice@acme.com</text>
  <text x="580" y="345" text-anchor="middle" fill="#8899aa" font-size="8">act.sub: ai-analyst-agent</text>
  <text x="580" y="359" text-anchor="middle" fill="#8899aa" font-size="8">aud: https://databricks.com</text>
  <text x="580" y="373" text-anchor="middle" fill="#FEE03B" font-size="8">exp: 60 seconds</text>

  <!-- Step 5: AS → Databricks RFC 8693 (HERO) -->
  <text x="690" y="398" text-anchor="middle" fill="#FEE03B" font-size="10" font-weight="bold">5. RFC 8693 Token Exchange</text>
  <text x="690" y="412" text-anchor="middle" fill="#8899aa" font-size="8">grant_type = urn:ietf:params:oauth:grant-type:token-exchange</text>
  <text x="690" y="424" text-anchor="middle" fill="#8899aa" font-size="8">subject_token = delegation JWT</text>
  <line x1="650" y1="432" x2="730" y2="432" stroke="#FEE03B" stroke-width="2" marker-end="url(#arr-gold)"/>

  <!-- Step 6: Databricks validate + issue -->
  <rect x="730" y="448" width="140" height="78" rx="4" fill="#AD83FF" fill-opacity="0.1" stroke="#AD83FF" stroke-width="1"/>
  <text x="800" y="464" text-anchor="middle" fill="#AD83FF" font-size="9" font-weight="bold">6. Validate + issue</text>
  <text x="800" y="480" text-anchor="middle" fill="#8899aa" font-size="8">Check iss / aud / sub</text>
  <text x="800" y="492" text-anchor="middle" fill="#8899aa" font-size="8">against federation policy</text>
  <text x="800" y="508" text-anchor="middle" fill="#8899aa" font-size="8">Return Databricks OAuth</text>
  <text x="800" y="520" text-anchor="middle" fill="#8899aa" font-size="8">token for Alice</text>

  <!-- Step 7: Databricks → AS (return) -->
  <line x1="730" y1="540" x2="650" y2="540" stroke="#AD83FF" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-purple)"/>
  <text x="690" y="534" text-anchor="middle" fill="#8899aa" font-size="8">Databricks access token</text>

  <!-- Step 8: AS → Gateway (passthrough) -->
  <line x1="510" y1="560" x2="430" y2="560" stroke="#6f5eea" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="470" y="554" text-anchor="middle" fill="#8899aa" font-size="8">forward to gateway</text>

  <!-- Step 9: Gateway → Databricks with token -->
  <line x1="430" y1="585" x2="730" y2="585" stroke="#00CFC7" stroke-width="2" marker-end="url(#arr-teal)"/>
  <text x="580" y="579" text-anchor="middle" fill="#00CFC7" font-size="9" font-weight="bold">9. Forward tool request · Authorization: Bearer &lt;dbx-token&gt;</text>

  <!-- Step 10: Databricks execute -->
  <rect x="730" y="600" width="140" height="38" rx="4" fill="#AD83FF" fill-opacity="0.1" stroke="#AD83FF" stroke-width="1"/>
  <text x="800" y="616" text-anchor="middle" fill="#AD83FF" font-size="9" font-weight="bold">10. Execute query</text>
  <text x="800" y="630" text-anchor="middle" fill="#FEE03B" font-size="8">Logged as alice@acme.com</text>

  <!-- Step 11: Return cascade -->
  <line x1="730" y1="655" x2="430" y2="655" stroke="#AD83FF" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arr-purple)"/>
  <line x1="290" y1="655" x2="190" y2="655" stroke="#6f5eea" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="580" y="649" text-anchor="middle" fill="#8899aa" font-size="8">query rows</text>
  <text x="240" y="649" text-anchor="middle" fill="#8899aa" font-size="8">tool result</text>

  <!-- Audit callout -->
  <rect x="40" y="690" width="820" height="50" rx="4" fill="#FEE03B" fill-opacity="0.08" stroke="#FEE03B" stroke-width="1"/>
  <text x="450" y="708" text-anchor="middle" fill="#FEE03B" font-size="10" font-weight="bold">Outcome: agent holds no warehouse credential · delegation JWT TTL ≈ 60s · Databricks token issued for the user</text>
  <text x="450" y="724" text-anchor="middle" fill="#8899aa" font-size="9">Databricks logs the user · Maverics Authorization Server records act.sub (the agent)</text>
  <text x="450" y="736" text-anchor="middle" fill="#8899aa" font-size="9">Revoke the user in the IdP and access ends the same minute</text>
</svg>
