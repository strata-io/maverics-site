<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phase1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#da3633;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#da3633;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="phase2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d29922;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#d29922;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="phase3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e36209;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e36209;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="phase4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b949e;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8b949e;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="898" height="318" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600" letter-spacing="0.5">Agentic Virus Lifecycle</text>

  <!-- Phase 1: Install -->
  <rect x="30" y="65" width="190" height="200" rx="8" fill="url(#phase1)" opacity="0.15" stroke="#da3633" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="30" y="65" width="190" height="32" rx="8" fill="#da3633" opacity="0.3"/>
  <text x="125" y="86" text-anchor="middle" fill="#ff7b72" font-size="13" font-weight="700" letter-spacing="1">PHASE 1</text>
  <text x="125" y="118" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Installation</text>
  <text x="125" y="142" text-anchor="middle" fill="#8b949e" font-size="11">Trending GitHub repo</text>
  <text x="125" y="159" text-anchor="middle" fill="#8b949e" font-size="11">Trojanized skills</text>
  <text x="125" y="176" text-anchor="middle" fill="#8b949e" font-size="11">Fake marketplace extensions</text>
  <text x="125" y="193" text-anchor="middle" fill="#8b949e" font-size="11">Curiosity-driven spread</text>
  <!-- Icon: download -->
  <text x="125" y="240" text-anchor="middle" fill="#da3633" font-size="28" opacity="0.7">&#x2B07;</text>

  <!-- Arrow 1->2 -->
  <line x1="224" y1="165" x2="244" y2="165" stroke="#484f58" stroke-width="2" filter="url(#glow)"/>
  <polygon points="244,160 254,165 244,170" fill="#484f58"/>

  <!-- Phase 2: Recon -->
  <rect x="255" y="65" width="190" height="200" rx="8" fill="url(#phase2)" opacity="0.15" stroke="#d29922" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="255" y="65" width="190" height="32" rx="8" fill="#d29922" opacity="0.3"/>
  <text x="350" y="86" text-anchor="middle" fill="#e3b341" font-size="13" font-weight="700" letter-spacing="1">PHASE 2</text>
  <text x="350" y="118" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Reconnaissance</text>
  <text x="350" y="142" text-anchor="middle" fill="#8b949e" font-size="11">SSH keys &amp; configs</text>
  <text x="350" y="159" text-anchor="middle" fill="#8b949e" font-size="11">Cloud CLI credentials</text>
  <text x="350" y="176" text-anchor="middle" fill="#8b949e" font-size="11">Environment secrets</text>
  <text x="350" y="193" text-anchor="middle" fill="#8b949e" font-size="11">Network topology</text>
  <!-- Icon: eye -->
  <text x="350" y="240" text-anchor="middle" fill="#d29922" font-size="28" opacity="0.7">&#x1F441;</text>

  <!-- Arrow 2->3 -->
  <line x1="449" y1="165" x2="469" y2="165" stroke="#484f58" stroke-width="2" filter="url(#glow)"/>
  <polygon points="469,160 479,165 469,170" fill="#484f58"/>

  <!-- Phase 3: Spread -->
  <rect x="480" y="65" width="190" height="200" rx="8" fill="url(#phase3)" opacity="0.15" stroke="#e36209" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="480" y="65" width="190" height="32" rx="8" fill="#e36209" opacity="0.3"/>
  <text x="575" y="86" text-anchor="middle" fill="#f0883e" font-size="13" font-weight="700" letter-spacing="1">PHASE 3</text>
  <text x="575" y="118" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Lateral Spread</text>
  <text x="575" y="142" text-anchor="middle" fill="#8b949e" font-size="11">SSH to adjacent hosts</text>
  <text x="575" y="159" text-anchor="middle" fill="#8b949e" font-size="11">Cloud instance cloning</text>
  <text x="575" y="176" text-anchor="middle" fill="#8b949e" font-size="11">Cross-cloud replication</text>
  <text x="575" y="193" text-anchor="middle" fill="#8b949e" font-size="11">Repeat Phase 2 per host</text>
  <!-- Icon: branch -->
  <text x="575" y="240" text-anchor="middle" fill="#e36209" font-size="28" opacity="0.7">&#x2442;</text>

  <!-- Arrow 3->4 -->
  <line x1="674" y1="165" x2="694" y2="165" stroke="#484f58" stroke-width="2" filter="url(#glow)"/>
  <polygon points="694,160 704,165 694,170" fill="#484f58"/>

  <!-- Phase 4: Persist -->
  <rect x="705" y="65" width="190" height="200" rx="8" fill="url(#phase4)" opacity="0.15" stroke="#8b949e" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="705" y="65" width="190" height="32" rx="8" fill="#8b949e" opacity="0.3"/>
  <text x="800" y="86" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="700" letter-spacing="1">PHASE 4</text>
  <text x="800" y="118" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Persistence</text>
  <text x="800" y="142" text-anchor="middle" fill="#8b949e" font-size="11">System service install</text>
  <text x="800" y="159" text-anchor="middle" fill="#8b949e" font-size="11">Backdoor creation</text>
  <text x="800" y="176" text-anchor="middle" fill="#8b949e" font-size="11">Log suppression</text>
  <text x="800" y="193" text-anchor="middle" fill="#8b949e" font-size="11">C2 exfiltration</text>
  <!-- Icon: lock -->
  <text x="800" y="240" text-anchor="middle" fill="#8b949e" font-size="28" opacity="0.7">&#x1F6E1;</text>

  <!-- Feedback loop arrow from Phase 4 back to Phase 2 -->
  <path d="M 800 270 L 800 295 Q 800 305 790 305 L 360 305 Q 350 305 350 295 L 350 270" fill="none" stroke="#484f58" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <polygon points="345,272 350,262 355,272" fill="#484f58" opacity="0.6"/>
  <text x="575" y="300" text-anchor="middle" fill="#484f58" font-size="10" font-style="italic">Each new host restarts the cycle</text>
</svg>
