<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="11">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6f5eea"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00CFC7"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FEE03B"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b6b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="#0D172E" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#FEE03B" font-size="14" font-weight="bold">Token Flow — enterprise_ledger_listAccounts</text>

  <!-- Column headers -->
  <text x="100" y="60" text-anchor="middle" fill="#AD83FF" font-size="12" font-weight="bold">Claude Code</text>
  <text x="330" y="60" text-anchor="middle" fill="#00CFC7" font-size="12" font-weight="bold">AI Identity Gateway</text>
  <text x="560" y="60" text-anchor="middle" fill="#6f5eea" font-size="12" font-weight="bold">OIDC Provider</text>
  <text x="780" y="60" text-anchor="middle" fill="#AD83FF" font-size="12" font-weight="bold">Enterprise Ledger</text>

  <!-- Lifelines -->
  <line x1="100" y1="75" x2="100" y2="620" stroke="#AD83FF" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="330" y1="75" x2="330" y2="620" stroke="#00CFC7" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="560" y1="75" x2="560" y2="620" stroke="#6f5eea" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="780" y1="75" x2="780" y2="620" stroke="#AD83FF" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Step 1: Claude calls tool with access token -->
  <rect x="30" y="90" width="140" height="40" rx="4" fill="#AD83FF" fill-opacity="0.1" stroke="#AD83FF" stroke-width="1"/>
  <text x="100" y="105" text-anchor="middle" fill="#AD83FF" font-size="9" font-weight="bold">1. Tool Call</text>
  <text x="100" y="120" text-anchor="middle" fill="#8899aa" font-size="8">+ access_token (JWT)</text>

  <line x1="170" y1="110" x2="260" y2="110" stroke="#6f5eea" stroke-width="2" marker-end="url(#arr)"/>
  <text x="215" y="103" text-anchor="middle" fill="#8899aa" font-size="8">listAccounts</text>

  <!-- Step 2: Gateway validates token -->
  <rect x="265" y="140" width="130" height="55" rx="4" fill="#00CFC7" fill-opacity="0.1" stroke="#00CFC7" stroke-width="1"/>
  <text x="330" y="155" text-anchor="middle" fill="#00CFC7" font-size="9" font-weight="bold">2. Validate Token</text>
  <text x="330" y="170" text-anchor="middle" fill="#8899aa" font-size="8">Verify JWT signature</text>
  <text x="330" y="182" text-anchor="middle" fill="#8899aa" font-size="8">Check aud: gateway.orchestrator.lab</text>

  <!-- Step 3: OPA Policy Evaluation -->
  <rect x="265" y="210" width="130" height="55" rx="4" fill="#00CFC7" fill-opacity="0.1" stroke="#00CFC7" stroke-width="1"/>
  <text x="330" y="225" text-anchor="middle" fill="#00CFC7" font-size="9" font-weight="bold">3. OPA Policy</text>
  <text x="330" y="240" text-anchor="middle" fill="#8899aa" font-size="8">enterprise-ledger-</text>
  <text x="330" y="252" text-anchor="middle" fill="#8899aa" font-size="8">inbound-authz.rego</text>

  <!-- OPA result -->
  <rect x="270" y="268" width="120" height="18" rx="3" fill="#00CFC7" fill-opacity="0.2"/>
  <text x="330" y="280" text-anchor="middle" fill="#00CFC7" font-size="9">✓ allowed: true</text>

  <!-- Step 4: Token Exchange -->
  <text x="445" y="303" text-anchor="middle" fill="#FEE03B" font-size="9" font-weight="bold">4. RFC 8693 Token Exchange</text>
  <text x="445" y="315" text-anchor="middle" fill="#8899aa" font-size="7">subject_token = user JWT · scope = ledger:ListAccounts</text>

  <line x1="395" y1="325" x2="495" y2="325" stroke="#FEE03B" stroke-width="2" marker-end="url(#arr-gold)"/>

  <!-- OIDC Provider mints delegation token -->
  <rect x="495" y="350" width="130" height="70" rx="4" fill="#6f5eea" fill-opacity="0.1" stroke="#6f5eea" stroke-width="1"/>
  <text x="560" y="365" text-anchor="middle" fill="#6f5eea" font-size="9" font-weight="bold">5. Mint Delegation</text>
  <text x="560" y="380" text-anchor="middle" fill="#8899aa" font-size="8">sub: john.mcclane</text>
  <text x="560" y="393" text-anchor="middle" fill="#8899aa" font-size="8">act.sub: ai-identity-gw</text>
  <text x="560" y="406" text-anchor="middle" fill="#FEE03B" font-size="8">TTL: 5 seconds</text>

  <!-- Return delegation token -->
  <line x1="495" y1="430" x2="395" y2="430" stroke="#6f5eea" stroke-width="2" marker-end="url(#arr)"/>
  <text x="445" y="425" text-anchor="middle" fill="#8899aa" font-size="7">delegation_token (JWT)</text>

  <!-- Step 6: Forward to upstream -->
  <line x1="395" y1="465" x2="715" y2="465" stroke="#00CFC7" stroke-width="2" marker-end="url(#arr-teal)"/>
  <text x="555" y="458" text-anchor="middle" fill="#00CFC7" font-size="9" font-weight="bold">6. Forward with delegation token</text>
  <text x="555" y="480" text-anchor="middle" fill="#8899aa" font-size="7">Authorization: Bearer {delegation_token}</text>

  <!-- Enterprise Ledger validates and responds -->
  <rect x="715" y="495" width="130" height="45" rx="4" fill="#AD83FF" fill-opacity="0.1" stroke="#AD83FF" stroke-width="1"/>
  <text x="780" y="510" text-anchor="middle" fill="#AD83FF" font-size="9" font-weight="bold">7. Validate + Respond</text>
  <text x="780" y="525" text-anchor="middle" fill="#8899aa" font-size="8">Verify delegation JWT</text>

  <!-- Response back -->
  <line x1="715" y1="555" x2="395" y2="555" stroke="#00CFC7" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arr-teal)"/>
  <text x="555" y="550" text-anchor="middle" fill="#8899aa" font-size="7">accounts data</text>

  <line x1="260" y1="575" x2="170" y2="575" stroke="#6f5eea" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="215" y="570" text-anchor="middle" fill="#8899aa" font-size="7">MCP tool result</text>

  <!-- Audit trail callout -->
  <rect x="50" y="600" width="800" height="35" rx="4" fill="#FEE03B" fill-opacity="0.08" stroke="#FEE03B" stroke-width="1"/>
  <text x="450" y="615" text-anchor="middle" fill="#FEE03B" font-size="9" font-weight="bold">Audit Trail: john.mcclane → ai-identity-gateway (actor) → ledger:ListAccounts → enterprise-ledger → 5s TTL → response</text>
  <text x="450" y="628" text-anchor="middle" fill="#8899aa" font-size="8">Every tool call produces a traceable delegation chain with scoped, ephemeral tokens</text>
</svg>
