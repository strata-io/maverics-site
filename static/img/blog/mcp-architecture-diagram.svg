<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="12">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6f5eea"/>
    </marker>
    <marker id="arrowhead-teal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00CFC7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#0D172E" rx="8"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#FEE03B" font-size="14" font-weight="bold">AI Identity Gateway — Architecture</text>

  <!-- Claude Code box -->
  <rect x="30" y="200" width="120" height="60" rx="6" fill="none" stroke="#AD83FF" stroke-width="2"/>
  <text x="90" y="225" text-anchor="middle" fill="#AD83FF" font-size="11" font-weight="bold">Claude Code</text>
  <text x="90" y="242" text-anchor="middle" fill="#8899aa" font-size="9">MCP Client</text>

  <!-- Arrow: Claude -> Envoy -->
  <line x1="150" y1="230" x2="200" y2="230" stroke="#6f5eea" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="175" y="220" text-anchor="middle" fill="#8899aa" font-size="8">HTTPS</text>

  <!-- Envoy box -->
  <rect x="210" y="190" width="100" height="80" rx="6" fill="none" stroke="#FEE03B" stroke-width="2"/>
  <text x="260" y="215" text-anchor="middle" fill="#FEE03B" font-size="11" font-weight="bold">Envoy</text>
  <text x="260" y="232" text-anchor="middle" fill="#8899aa" font-size="9">TLS + mTLS</text>
  <text x="260" y="248" text-anchor="middle" fill="#8899aa" font-size="9">Routing</text>

  <!-- Arrow: Envoy -> Gateway -->
  <line x1="310" y1="230" x2="370" y2="230" stroke="#6f5eea" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="340" y="220" text-anchor="middle" fill="#8899aa" font-size="8">mTLS</text>

  <!-- Gateway box (large) -->
  <rect x="380" y="130" width="220" height="200" rx="6" fill="none" stroke="#00CFC7" stroke-width="2"/>
  <text x="490" y="155" text-anchor="middle" fill="#00CFC7" font-size="12" font-weight="bold">AI Identity Gateway</text>
  <text x="490" y="172" text-anchor="middle" fill="#8899aa" font-size="9">Maverics Orchestrator</text>

  <!-- mcpProvider sub-box -->
  <rect x="395" y="185" width="190" height="35" rx="4" fill="none" stroke="#6f5eea" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="490" y="200" text-anchor="middle" fill="#6f5eea" font-size="9">mcpProvider (OAuth + OPA)</text>
  <text x="490" y="213" text-anchor="middle" fill="#8899aa" font-size="8">Token validation · Policy eval</text>

  <!-- Proxy sub-box -->
  <rect x="395" y="228" width="190" height="30" rx="4" fill="none" stroke="#00CFC7" stroke-width="1"/>
  <text x="490" y="248" text-anchor="middle" fill="#00CFC7" font-size="9">mcpProxy: enterprise-ledger</text>

  <!-- Bridge sub-box -->
  <rect x="395" y="266" width="190" height="30" rx="4" fill="none" stroke="#00CFC7" stroke-width="1"/>
  <text x="490" y="286" text-anchor="middle" fill="#00CFC7" font-size="9">mcpBridge: employee-directory</text>

  <!-- Token Exchange label -->
  <text x="490" y="315" text-anchor="middle" fill="#FEE03B" font-size="8">RFC 8693 Token Exchange ↕</text>

  <!-- Arrow: Gateway -> Enterprise Ledger -->
  <line x1="600" y1="243" x2="670" y2="190" stroke="#00CFC7" stroke-width="2" marker-end="url(#arrowhead-teal)"/>

  <!-- Arrow: Gateway -> Employee Directory -->
  <line x1="600" y1="281" x2="670" y2="310" stroke="#00CFC7" stroke-width="2" marker-end="url(#arrowhead-teal)"/>

  <!-- Enterprise Ledger box -->
  <rect x="680" y="155" width="180" height="70" rx="6" fill="none" stroke="#AD83FF" stroke-width="2"/>
  <text x="770" y="178" text-anchor="middle" fill="#AD83FF" font-size="11" font-weight="bold">Enterprise Ledger</text>
  <text x="770" y="195" text-anchor="middle" fill="#8899aa" font-size="9">Go MCP Server</text>
  <text x="770" y="210" text-anchor="middle" fill="#8899aa" font-size="8">Accounts · PII · Audit</text>

  <!-- Employee Directory box -->
  <rect x="680" y="280" width="180" height="70" rx="6" fill="none" stroke="#AD83FF" stroke-width="2"/>
  <text x="770" y="303" text-anchor="middle" fill="#AD83FF" font-size="11" font-weight="bold">Employee Directory</text>
  <text x="770" y="320" text-anchor="middle" fill="#8899aa" font-size="9">Go REST API + OpenAPI</text>
  <text x="770" y="335" text-anchor="middle" fill="#8899aa" font-size="8">→ auto-generated MCP tools</text>

  <!-- OIDC Provider box -->
  <rect x="340" y="390" width="180" height="70" rx="6" fill="none" stroke="#6f5eea" stroke-width="2"/>
  <text x="430" y="413" text-anchor="middle" fill="#6f5eea" font-size="11" font-weight="bold">OIDC Provider</text>
  <text x="430" y="430" text-anchor="middle" fill="#8899aa" font-size="9">Maverics Orchestrator</text>
  <text x="430" y="445" text-anchor="middle" fill="#8899aa" font-size="8">Auth Server · Token Exchange · JWKS</text>

  <!-- Arrow: Gateway <-> OIDC Provider -->
  <line x1="490" y1="330" x2="460" y2="388" stroke="#6f5eea" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="500" y="365" text-anchor="start" fill="#8899aa" font-size="8">validate + exchange</text>

  <!-- Keycloak box -->
  <rect x="100" y="390" width="140" height="70" rx="6" fill="none" stroke="#FEE03B" stroke-width="2"/>
  <text x="170" y="413" text-anchor="middle" fill="#FEE03B" font-size="11" font-weight="bold">Keycloak</text>
  <text x="170" y="430" text-anchor="middle" fill="#8899aa" font-size="9">Identity Provider</text>
  <text x="170" y="445" text-anchor="middle" fill="#8899aa" font-size="8">Test users + OIDC</text>

  <!-- Arrow: OIDC Provider -> Keycloak -->
  <line x1="340" y1="425" x2="245" y2="425" stroke="#FEE03B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="290" y="418" text-anchor="middle" fill="#8899aa" font-size="8">OIDC</text>

  <!-- Redis box -->
  <rect x="570" y="420" width="90" height="45" rx="6" fill="none" stroke="#8899aa" stroke-width="1"/>
  <text x="615" y="440" text-anchor="middle" fill="#8899aa" font-size="10">Redis</text>
  <text x="615" y="455" text-anchor="middle" fill="#8899aa" font-size="8">Session cache</text>

  <!-- Vault box -->
  <rect x="690" y="420" width="90" height="45" rx="6" fill="none" stroke="#8899aa" stroke-width="1"/>
  <text x="735" y="440" text-anchor="middle" fill="#8899aa" font-size="10">Vault</text>
  <text x="735" y="455" text-anchor="middle" fill="#8899aa" font-size="8">Secrets</text>

  <!-- Dashed line: OIDC Provider -> Redis -->
  <line x1="520" y1="435" x2="570" y2="440" stroke="#8899aa" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Dashed line: OIDC Provider -> Vault (down from OIDC Provider bottom, right under Redis, up to Vault bottom) -->
  <polyline points="430,460 430,485 735,485 735,465" fill="none" stroke="#8899aa" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <text x="30" y="500" fill="#8899aa" font-size="9">■ Identity</text>
  <rect x="28" y="492" width="8" height="8" fill="#6f5eea"/>
  <text x="110" y="500" fill="#8899aa" font-size="9">■ Gateway</text>
  <rect x="108" y="492" width="8" height="8" fill="#00CFC7"/>
  <text x="190" y="500" fill="#8899aa" font-size="9">■ Infrastructure</text>
  <rect x="188" y="492" width="8" height="8" fill="#FEE03B"/>
  <text x="300" y="500" fill="#8899aa" font-size="9">■ Applications</text>
  <rect x="298" y="492" width="8" height="8" fill="#AD83FF"/>
</svg>
